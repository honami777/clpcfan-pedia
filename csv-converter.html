<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>🍑ぴちペディア データ変換ツール</title>

<style>
body{
    font-family:sans-serif;
    max-width:900px;
    margin:30px auto;
    padding:20px;
    background:#fffdf7;
}

h1{
    color:#ff8c42;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin:10px 0;
}

textarea{
    width:100%;
    height:500px;
    font-family:monospace;
    font-size:14px;
}
</style>
</head>

<body>

<h1>🍑ぴちペディア データ変換ツール</h1>

<input type="file" id="csvFile" accept=".csv">
<br>
<button onclick="convertCSV()">変換</button>

<h2>videos.js</h2>

<textarea id="output"></textarea>

<script>

function convertCSV(){

    const file = document.getElementById("csvFile").files[0];

    if(!file){
        alert("CSVファイルを選択してください");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        const text = e.target.result;

        const rows = text.trim().split("\n");

        rows.shift(); // ヘッダー削除

        let output = "const videos = [\n";

        rows.forEach((row,index)=>{

            const cols = row.split(",");

            const title = cols[0];
            const type = cols[1];
            const members = cols[2]
                .split("|")
                .map(name=>`"${name}"`)
                .join(", ");

            const series = cols[3];
            const collab = cols[4];
            const videoId = cols[5];

            output += `  {
    title: "${title}",
    type: "${type}",
    members: [${members}],
    series: "${series}",
    collab: "${collab}",
    videoId: "${videoId}",
    url: "https://www.youtube.com/watch?v=${videoId}"
  }`;

            if(index < rows.length-1){
                output += ",";
            }

            output += "\n";

        });

        output += "];";

        document.getElementById("output").value = output;

    };

    reader.readAsText(file,"UTF-8");
}

</script>

</body>
</html>
