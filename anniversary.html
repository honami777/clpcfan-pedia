<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ぴちペディア 6周年記念ページ</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>
body {
    margin: 0;
    font-family: sans-serif;
    color: #444;

    background-image: url("anniversary-bg.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;

    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 30px;
    box-sizing: border-box;
}

.container {
    max-width: 700px;
    width: 100%;

    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(8px);

    border-radius: 24px;

    padding: 40px 30px;

    text-align: center;

    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.logo {
    width: 180px;
    max-width: 70%;
    margin-bottom: 20px;
}

h1 {
    color: #ff8c42;
    margin-bottom: 20px;
    font-size: 36px;
}

.message {
    font-size: 18px;
    line-height: 2;
    margin-bottom: 35px;
}

.thanks {
    font-size: 16px;
    color: #777;
    margin-bottom: 40px;
}

.home-button {
    display: inline-block;

    padding: 14px 28px;

    background: #fff2e8;
    color: #ff8c42;

    text-decoration: none;

    border-radius: 999px;

    font-weight: bold;

    transition: all 0.2s ease;
}

.home-button:hover {
    background: #ffe4cf;
    transform: translateY(-2px);
}

footer {
    margin-top: 40px;
    color: #999;
    font-size: 13px;
}

@media (max-width: 768px) {

    .container {
        padding: 35px 25px;
    }

    h1 {
        font-size: 28px;
    }

    .message {
        font-size: 16px;
    }

    .logo {
        width: 150px;
    }
}
</style>
</head>

<body>

<div class="container">

    <img src="logo.png" alt="ぴちペディア" class="logo">

    <h1>🎉 6周年おめでとう！ 🎉</h1>

    <div class="message">
        カラフルピーチ6周年、本当におめでとうございます🍑🌈<br><br>

        笑ったり、驚いたり、感動したり。<br>
        たくさんの思い出を届けてくれたカラフルピーチに感謝を込めて、<br>
        ぴちペディアでも小さなお祝いページを作りました✨
    </div>

    <div class="thanks">
        これからも素敵な物語と笑顔が続きますように。
    </div>

    <a href="index.html" class="home-button">
        🏠 トップページへ戻る
    </a>

    <footer>
        🍑 PichiPedia 6th Anniversary
    </footer>

</div>

</body>
</html>
