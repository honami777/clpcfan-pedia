<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>🍑YouTube動画取得ツール</title>
</head>
<body>
  <h1>🍑YouTube動画取得ツール</h1>

  <p>APIキー</p>
  <input id="apiKey" type="text" style="width:500px">

  <p>チャンネルID</p>
  <input id="channelId" type="text" value="UCxxxxxx" style="width:500px">

  <p>期間</p>
  <input id="startDate" type="date" value="2026-01-01">
  〜
  <input id="endDate" type="date" value="2026-07-01">

  <br><br>
  <button onclick="fetchVideos()">取得</button>
  <button onclick="copyCsv()">コピー</button>

  <h2>CSV</h2>
  <textarea id="output" style="width:100%;height:400px;"></textarea>

  <script>
    async function fetchVideos() {
      const apiKey = document.getElementById("apiKey").value.trim();
      const channelId = document.getElementById("channelId").value.trim();
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;

      if (!apiKey || !channelId) {
        alert("APIキーとチャンネルIDを入れてね");
        return;
      }

      let allItems = [];
      let pageToken = "";

      do {
        const url =
          "https://www.googleapis.com/youtube/v3/search" +
          "?part=snippet" +
          "&channelId=" + encodeURIComponent(channelId) +
          "&type=video" +
          "&order=date" +
          "&maxResults=50" +
          "&publishedAfter=" + startDate + "T00:00:00Z" +
          "&publishedBefore=" + endDate + "T00:00:00Z" +
          "&key=" + encodeURIComponent(apiKey) +
          (pageToken ? "&pageToken=" + pageToken : "");

        const res = await fetch(url);
        const data = await res.json();

        if (data.error) {
          console.error(data.error);
          alert("エラー: " + data.error.message);
          return;
        }

        allItems = allItems.concat(data.items);
        pageToken = data.nextPageToken || "";
      } while (pageToken);

      const rows = [["title", "type", "videoId", "date"]];

      allItems.forEach(item => {
        const title = item.snippet.title;
        const videoId = item.id.videoId;
        const date = item.snippet.publishedAt.slice(0, 10);

        rows.push([
          title,
          "動画",
          videoId,
          date
        ]);
      });

      const csv = rows.map(row =>
        row.map(value => `"${String(value).replaceAll('"', '""')}"`).join(",")
      ).join("\n");

      document.getElementById("output").value = csv;
    }

    function copyCsv() {
      const output = document.getElementById("output");
      output.select();
      document.execCommand("copy");
      alert("コピーしたよ！");
    }
  </script>
</body>
</html>
