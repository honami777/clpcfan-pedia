<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>🍑YouTube動画取得ツール</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
      background: #fffaf3;
    }
    h1 {
      color: #ff7f3f;
    }
    button {
      padding: 12px 24px;
      margin: 8px 8px 8px 0;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    input, select {
      padding: 8px;
      font-size: 16px;
      margin: 6px 0;
    }
    textarea {
      width: 100%;
      height: 420px;
      font-size: 14px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>🍑YouTube動画取得ツール</h1>

  <p>取得期間</p>
  <input id="startDate" type="date" value="2026-01-01">
  〜
  <input id="endDate" type="date" value="2026-07-01">

  <p>出力形式</p>
  <select id="format">
    <option value="tsv">TSV（スプシ用）</option>
    <option value="csv">CSV</option>
    <option value="js">videos.js</option>
  </select>

  <br><br>

  <button onclick="fetchVideos()">取得</button>
  <button onclick="copyOutput()">コピー</button>

  <p id="status"></p>

  <h2 id="outputTitle">TSV</h2>
  <textarea id="output" placeholder="ここに出力されます"></textarea>

  <script>
    const API_KEY = "AIzaSyBYexKZyVxzr6AkWgLTmhYYe8TpJjpnxhg";
    const CHANNEL_ID = "UCh7bThzNArch6TgoHB1HVhA";

    function decodeHtml(text) {
  let result = text;

  for (let i = 0; i < 3; i++) {
    const textarea = document.createElement("textarea");
    textarea.innerHTML = result;
    result = textarea.value;
  }

  return result;
}
 

    async function fetchVideos() {
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;
      const format = document.getElementById("format").value;
      const status = document.getElementById("status");
      const output = document.getElementById("output");
      const outputTitle = document.getElementById("outputTitle");

      status.textContent = "取得中...";
      output.value = "";

      let allItems = [];
      let pageToken = "";

      try {
        do {
          const url =
            "https://www.googleapis.com/youtube/v3/search" +
            "?part=snippet" +
            "&channelId=" + encodeURIComponent(CHANNEL_ID) +
            "&type=video" +
            "&order=date" +
            "&maxResults=50" +
            "&publishedAfter=" + startDate + "T00:00:00Z" +
            "&publishedBefore=" + endDate + "T00:00:00Z" +
            "&key=" + encodeURIComponent(API_KEY) +
            (pageToken ? "&pageToken=" + pageToken : "");

          const res = await fetch(url);
          const data = await res.json();

          if (data.error) {
            status.textContent = "エラー: " + data.error.message;
            return;
          }

          allItems = allItems.concat(data.items || []);
          pageToken = data.nextPageToken || "";
        } while (pageToken);

        const videos = allItems.map(item => ({
          title: decodeHtml(item.snippet.title),
          type: "動画",
          members: "",
          series: "",
          collab: "",
          videoId: item.id.videoId,
          date: item.snippet.publishedAt.slice(0, 10)
        }));

        videos.sort((a, b) => a.date.localeCompare(b.date));

        const rows = [[
          "title",
          "type",
          "members",
          "series",
          "collab",
          "videoId",
          "date"
        ]];

        videos.forEach(v => {
          rows.push([
            v.title,
            v.type,
            v.members,
            v.series,
            v.collab,
            v.videoId,
            v.date
          ]);
        });

        let text = "";

        if (format === "tsv") {
          outputTitle.textContent = "TSV（スプシ用）";
          text = rows.map(row =>
            row.map(value => String(value).replaceAll("\t", " ")).join("\t")
          ).join("\n");
        }

        if (format === "csv") {
          outputTitle.textContent = "CSV";
          text = rows.map(row =>
            row.map(value => `"${String(value).replaceAll('"', '""')}"`).join(",")
          ).join("\n");
        }

        if (format === "js") {
          outputTitle.textContent = "videos.js";
          const jsData = videos.map(v => ({
            title: v.title,
            type: v.type,
            members: v.members,
            series: v.series,
            collab: v.collab,
            videoId: v.videoId,
            date: v.date
          }));

          text = "const videos = " + JSON.stringify(jsData, null, 2) + ";";
        }

        output.value = text;
        status.textContent = `${videos.length}件取得できたよ！`;
      } catch (error) {
        console.error(error);
        status.textContent = "取得に失敗しました。APIキーや設定を確認してね。";
      }
    }

    function copyOutput() {
      const output = document.getElementById("output");
      output.select();
      document.execCommand("copy");
      alert("コピーしたよ！");
    }
  </script>
</body>
</html>
