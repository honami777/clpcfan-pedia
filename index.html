<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ぴちペディア | カラフルピーチ非公式ファンサイト</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
            background: #fffdf7;
        }

        h1 {
            color: #ff8c42;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid #ddd;
            box-sizing: border-box;
            margin-bottom: 30px;
        }

.menu {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 0;
    margin-bottom: 30px;
}

        .card {
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 12px;
            text-decoration: none;
            color: black;
        }

        .card:hover {
            background: #fff2e8;
        }

        footer {
            margin-top: 50px;
            color: gray;
            font-size: 14px;
        }
.results {
    margin-top: 20px;
}

.video-card {
    display: flex;
    gap: 18px;
    padding: 18px;
    border: 1px solid #ddd;
    border-radius: 12px;
    margin-top: 15px;
    background: white;
}

.thumbnail {
    width: 200px;
    border-radius: 10px;
}
    </style>
</head>
<body>

    <h1>🍑 ぴちペディア</h1>

    <p>
        カラフルピーチの動画・シリーズ・コラボ情報を検索できる
        非公式ファンサイトです。
    </p>

    <input
        type="text"
        class="search-box"
        placeholder="動画を検索"
    />

    <div id="result-count"></div>
    
    <div id="results"></div>

    
    <div id="results"></div>
        <a href="#" class="card">🎥 動画検索</a>
        <a href="#" class="card">👤 メンバー検索</a>
        <a href="#" class="card">🤝 コラボ検索</a>
        <a href="#" class="card">📚 シリーズ一覧</a>
    </div>

    <footer>
        ※当サイトはカラフルピーチの非公式ファンサイトです。
    </footer>

    
<script src="videos.js"></script>
<script>
const searchInput = document.querySelector(".search-box");
const resultArea = document.getElementById("results");
const resultCount = document.getElementById("result-count");
  function showResults(keyword) {
    resultArea.innerHTML = "";

    if (!keyword) {
  return;
　　}

    const results = videos.filter(video => {
      const text = [
        video.title,
        video.members.join(" "),
        video.series,
        video.collab
      ].join(" ");

      return text.includes(keyword);
    });

    if (results.length === 0) {
      resultArea.innerHTML = "<p>見つかりませんでした。</p>";
      return;
    }

  results.forEach(video => {
  const card = document.createElement("div");
  card.className = "video-card";

  card.innerHTML = `
    <img
      src="https://img.youtube.com/vi/${video.videoId}/mqdefault.jpg"
      alt="${video.title}"
      class="thumbnail"
    >
    <div>
      <h3>${video.title}</h3>
      <p>メンバー：${video.members.join("、")}</p>
      <p>シリーズ：${video.series}</p>
      <p>コラボ：${video.collab || "なし"}</p>
      <a href="${video.url}" target="_blank">動画を見る</a>
    </div>
  `;

  resultArea.appendChild(card);
});
  }

  searchInput.addEventListener("input", () => {
    showResults(searchInput.value.trim());
  });

  showResults("");
</script>
</body>
</html>
