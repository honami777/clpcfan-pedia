<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ぴちペディア | カラフルピーチ非公式ファンサイト</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
            background: #fffdf7;
        }

        h1 {
            color: #ff8c42;
        }     

.site-logo {
    margin-bottom: 20px;
    text-align: center;
}


.site-logo img {
    width: 360px;
    max-width: 100%;
    height: auto;
    display: block;
}

.site-description {
    margin-bottom: 20px;
}

       
        .search-box {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid #ddd;
            box-sizing: border-box;
            margin-bottom: 30px;
        }

.menu {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 0;
    margin-bottom: 30px;
}

        .card {
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 12px;
            text-decoration: none;
            color: black;
        }

        .card:hover {
            background: #fff2e8;
        }

        footer {
            margin-top: 50px;
            color: gray;
            font-size: 14px;
        }
.results {
    margin-top: 20px;
}

.video-card {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 22px;
    padding: 20px;
    border: 1px solid #ddd;
    border-radius: 16px;
    margin-top: 16px;
    background: white;
    align-items: start;
    
    transition: all 0.2s ease;
}

.video-card:hover {
    background: #fff2e8;
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
}

.thumbnail {
    width: 220px;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    border-radius: 12px;
}

.video-card h3 {
    margin-top: 0;
    margin-bottom: 12px;
    font-size: 22px;
}
.video-card h3 a {
    color: #333;
    text-decoration: none;
}

.video-card h3 a:hover {
    color: #ff8c42;
}    


.video-card p {
    margin: 10px 0;
    color: #555;
    line-height: 1.6;
}

#result-count {
    margin-top: 20px;
    margin-bottom: 10px;
    font-weight: bold;
    color: #666;
}


    @media (max-width: 768px) {
    .video-card {
        grid-template-columns: 1fr;
    }

    .thumbnail {
        width: 100%;
    }

    .member-list,
    .menu {
        grid-template-columns: 1fr;
    }
}
        .latest-list {
    display: grid;
    gap: 14px;
    margin-bottom: 35px;
}

.latest-card {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 16px;
    padding: 14px;
    border: 1px solid #ffd7bd;
    border-radius: 14px;
    background: #fff;
    text-decoration: none;
    color: black;
}

.latest-card:hover {
    background: #fff2e8;
    transform: translateY(-2px);
}

.latest-card img {
    width: 160px;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    border-radius: 10px;
}

.latest-card h3 {
    margin: 0 0 8px;
    font-size: 16px;
}

.latest-card p {
    margin: 4px 0;
    color: #666;
    font-size: 14px;
}

@media (max-width: 768px) {
    .latest-card {
        grid-template-columns: 1fr;
    }

    .latest-card img {
        width: 100%;
    }
}

.more-link {
    text-align: center;
    margin-top: 10px;
    margin-bottom: 30px;
}

.more-link a:hover {
    text-decoration: underline;
}

.badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    background: #fff2e8;
    color: #ff8c42;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 8px;
}
    </style>
</head>
<body>

    <div class="site-logo">
  <img src="logo.png" alt="ぴちペディア">
</div>

    <p class="site-description">
    カラフルピーチの動画・シリーズ・コラボ情報を検索できる
    非公式ファンサイトです。
</p>

    <input
        type="text"
        class="search-box"
        placeholder="動画を検索"
    />

    <div class="menu">
        <a href="videos.html" class="card" target="_blank">🎥 動画検索</a>
        <a href="members.html" class="card" target="_blank">👤 メンバー検索</a>
        <a href="collabs.html" class="card" target="_blank">🤝 コラボ検索</a>
        <a href="series.html" class="card" target="_blank">📚 シリーズ一覧</a>
    </div>

    <h2>🆕 最新追加動画</h2>
    <div id="latest-videos" class="latest-list"></div>

    <p class="more-link"> 
    <a href="videos.html">▶ 動画一覧を見る</a>
    </p>

    

    <div id="result-count"></div>
    <div id="results"></div>


    
    <footer>
        ※当サイトはカラフルピーチの非公式ファンサイトです。
    </footer>

    
<script src="videos.js"></script>
<script>
    const searchInput = document.querySelector(".search-box");
    const resultArea = document.getElementById("results");
    const resultCount = document.getElementById("result-count");

    const latestArea = document.getElementById("latest-videos");

function showLatestVideos() {
  latestArea.innerHTML = "";

  const latestVideos = [...videos]
    .filter(video => video.date)
    .sort((a, b) => b.date.localeCompare(a.date))
    .slice(0, 2);

  latestVideos.forEach(video => {
    const card = document.createElement("a");
    card.className = "latest-card";
    card.href = video.url;
    card.target = "_blank";

    card.innerHTML = `
      <img
        src="https://img.youtube.com/vi/${video.videoId}/mqdefault.jpg"
        alt="${video.title}"
      >

      <div>
        <h3>${video.title}</h3>
        <p>📅 ${video.date}</p>
        <p>📚 ${video.series || "-"}</p>
        <p>🤝 ${video.collab || "-"}</p>
      </div>
    `;

    latestArea.appendChild(card);
  });
}





    
  function showResults(keyword) {
    resultArea.innerHTML = "";

      if (!keyword)  {
        resultCount.innerHTML = "";
        return;
    }
    const results = videos.filter(video => {
      const text = [
        video.title,
        video.members.join(" "),
        video.series,
        video.collab
      ].join(" ");

      return text.includes(keyword);
    });

    if (results.length === 0) {
        resultCount.innerHTML =
    `「${keyword}」の検索結果：0件`;

        resultArea.innerHTML =
            "<p>見つかりませんでした。</p>";

    return;
}

resultCount.innerHTML =
  `「${keyword}」の検索結果：${results.length}件`;
      
  results.forEach(video => {
  const card = document.createElement("div");
  card.className = "video-card";

  card.innerHTML = `
<a href="${video.url}" target="_blank">
  <img
    src="https://img.youtube.com/vi/${video.videoId}/mqdefault.jpg"
    alt="${video.title}"
    class="thumbnail"
  >
</a>
<div>

  <span class="badge">
    ${video.type || "動画"}
  </span>

  <h3>
    <a href="${video.url}" target="_blank">
      ${video.title}
    </a>
  </h3>

  <p>メンバー：${video.members.join("、")}</p>
  <p>シリーズ：${video.series || "-"}</p>
  <p>コラボ：${video.collab || "-"}</p>

  <a href="${video.url}" target="_blank">
    動画を見る
  </a>

</div>
  `;

  resultArea.appendChild(card);
});
  }

  searchInput.addEventListener("input", () => {
    showResults(searchInput.value.trim());
  });

  showLatestVideos();
  showResults("");
</script>
    
</body>
</html>
